<div class="frm">
    <div class="container">
        <div class="row indi1 indi11">
            <h6>Contacto</h6>
        </div>
        <div class="row indi1">
            <h3>¿Listo para empezar?</h3>
        </div>
        <div class="row indi1">
            <h6>Un especialista te contactará en menos de 24 horas</h6>
        </div>
        <form class="row g-3 frm">
            <div class="col-md-6">
                <label for="inputxt" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="inputxt">
            </div>
            <div class="col-md-6">
                <label for="txtApellidos" class="form-label">Apellidos</label>
                <input type="text" class="form-control" id="txtApellidos">
            </div>
            <div class="col-12">
                <label for="textemail" class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" id="textemail" placeholder="ejemplo@gmail.com">
            </div>
            <div class="col-12">
                <label for="txtEmpre" class="form-label">Empresa</label>
                <input type="text" class="form-control" id="txtEmpre" placeholder="El nombre de su empresa">
            </div>
            <div class="col-12">
                <label for="inputSelect" class="form-label">¿Que necesitas?</label>
                <select id="inputSelect" class="form-select">
                    <option selected>Selecciona</option>
                    <option>Asesoria para mi empresa</option>
                    <option>Prueba beta</option>
                    <option>Comprar</option>
                    <option>Mas información</option>
                    <option>Sugerencias</option>
                </select>
            </div>
            <div class="col-12">
                <label for="inputMensaje" class="form-label">Mensaje</label>
                <textarea name="txtMsj" class="form-control" id="inputMensaje"></textarea>
            </div>
            <div class="col-12">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="gridCheck">
                    <label class="form-check-label" for="gridCheck">
                        Acepto los Terminos y Condiciones
                    </label>
                </div>
            </div>
            <div class="row">
                <button type="submit" class=" btnfrm">Enviar mensaje</button>
            </div>
        </form>
    </div>
</div>
