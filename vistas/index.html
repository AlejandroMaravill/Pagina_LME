<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <link rel="stylesheet" href="/style/bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/style/style.css">
    <script src="https://kit.fontawesome.com/df31474162.js" crossorigin="anonymous"></script>
</head>
<body>
    <nav>
        <!--En esta parte se construira el navar-->
    </nav>
    <header>
        <!--En esta parte de construira el header-->
    </header>
    <main>
        <!--En esta parte ira el contenido principal-->
    </main>
    <section>
        <div id="nosotros"></div>
        <div id="form"></div>
    </section>
    <footer>
        <div id="foot"></div>
    </footer>
    <script src="/style/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            fetch("nosotros.html")
                .then(r => r.text())
                .then(data => {
                    document.getElementById("nosotros").innerHTML = data;
                });
        });
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            fetch("form.html")
                .then(r => r.text())
                .then(data => {
                    document.getElementById("form").innerHTML = data;
                });
        });
    </script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            fetch("footer.html")
                .then(r => r.text())
                .then(data => {
                    document.getElementById("foot").innerHTML = data;
                });
        });
    </script>
</body>
</html>
